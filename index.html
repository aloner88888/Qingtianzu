<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>晴天租 · 租金计算器</title>
    <style>
        /* ===== 全局重置 ===== */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #f5f7fb;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            margin: 0;
            color: #1e293b;
        }

        .calculator {
            max-width: 820px;
            width: 100%;
            background: #ffffff;
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 8px 24px rgba(0, 0, 0, 0.04);
            padding: 36px 40px 44px;
            transition: box-shadow 0.25s ease;
        }

        .calculator:hover {
            box-shadow: 0 28px 72px rgba(0, 0, 0, 0.10);
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
            padding-bottom: 18px;
            border-bottom: 2px solid #f1f4f9;
        }

        .header .icon {
            font-size: 32px;
            line-height: 1;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.3px;
            color: #0f172a;
            margin: 0;
        }

        .header .badge {
            margin-left: auto;
            font-size: 13px;
            font-weight: 500;
            color: #64748b;
            background: #f1f4f9;
            padding: 4px 14px;
            border-radius: 40px;
            letter-spacing: 0.2px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px 28px;
            margin-bottom: 18px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .field-group.full-width {
            grid-column: 1 / -1;
        }

        .field-group .label-row {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }

        .field-group label {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            letter-spacing: 0.2px;
        }

        .field-group .required {
            color: #ef4444;
            font-weight: 700;
            font-size: 15px;
            line-height: 1;
        }

        .field-group .hint {
            font-size: 12px;
            font-weight: 400;
            color: #94a3b8;
            background: #f8fafc;
            padding: 0 8px;
            border-radius: 4px;
            line-height: 20px;
        }

        .field-group .hint--warning {
            color: #b45309;
            background: #fffbeb;
        }

        .field-group input {
            width: 100%;
            height: 44px;
            padding: 0 14px;
            font-size: 15px;
            font-weight: 500;
            color: #0f172a;
            background: #fafcff;
            border: 1.5px solid #e2e8f0;
            border-radius: 12px;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
            outline: none;
            font-family: inherit;
        }

        .field-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.10);
            background: #ffffff;
        }

        .field-group input::placeholder {
            color: #cbd5e1;
            font-weight: 400;
            font-size: 14px;
        }

        .field-group input:disabled {
            background: #f1f4f9;
            color: #94a3b8;
            cursor: not-allowed;
            border-color: #e2e8f0;
        }

        .field-group .unit {
            font-size: 13px;
            font-weight: 500;
            color: #64748b;
            margin-top: 2px;
            padding-left: 4px;
        }

        .mode-switch {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 18px;
            padding: 14px 18px;
            background: #f8fafc;
            border-radius: 16px;
            border: 1.5px solid #eef2f6;
            margin-top: 2px;
        }

        .mode-switch .mode-label {
            font-size: 14px;
            font-weight: 600;
            color: #1e293b;
            white-space: nowrap;
        }

        .mode-switch .toggle-group {
            display: flex;
            background: #eef2f6;
            border-radius: 40px;
            padding: 3px;
            gap: 2px;
            flex: 0 0 auto;
        }

        .mode-switch .toggle-btn {
            padding: 6px 22px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            color: #64748b;
            letter-spacing: 0.2px;
        }

        .mode-switch .toggle-btn.active {
            background: #ffffff;
            color: #0f172a;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        .mode-switch .toggle-btn:not(.active):hover {
            color: #1e293b;
            background: rgba(255, 255, 255, 0.4);
        }

        .mode-switch .mode-hint {
            font-size: 13px;
            color: #94a3b8;
            margin-left: auto;
        }

        .field-group.first-month-rent {
            grid-column: 1 / -1;
            display: none;
        }

        .field-group.first-month-rent.visible {
            display: flex;
        }

        .field-group.buyout {
            grid-column: 1 / -1;
        }

        .actions {
            display: flex;
            justify-content: flex-end;
            gap: 16px;
            margin-top: 8px;
            padding-top: 20px;
            border-top: 1.5px solid #f1f4f9;
        }

        .btn {
            padding: 10px 34px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 0.3px;
            background: #f1f4f9;
            color: #475569;
        }

        .btn-primary {
            background: #0f172a;
            color: #ffffff;
            box-shadow: 0 4px 14px rgba(15, 23, 42, 0.12);
        }

        .btn-primary:hover {
            background: #1e293b;
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.16);
        }

        .btn-primary:active {
            transform: translateY(0);
            box-shadow: 0 4px 12px rgba(15, 23, 42, 0.10);
        }

        .btn-secondary {
            background: #f1f4f9;
            color: #475569;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .result-area {
            margin-top: 28px;
            padding-top: 28px;
            border-top: 2px solid #f1f4f9;
            display: none;
        }

        .result-area.visible {
            display: block;
            animation: fadeUp 0.35s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 结果汇总：强制5列一行，并自适应字体 */
        .result-summary {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px 16px;
            background: #fafcff;
            border-radius: 16px;
            padding: 16px 18px;
            border: 1.5px solid #eef2f6;
            margin-bottom: 24px;
        }

        .result-item {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
        }

        .result-item .label {
            font-size: 11px;
            font-weight: 500;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            white-space: nowrap;
        }

        .result-item .value {
            font-size: 18px;
            font-weight: 700;
            color: #0f172a;
            letter-spacing: -0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-item .value .currency {
            font-size: 14px;
            font-weight: 600;
            color: #64748b;
            margin-right: 2px;
        }

        .result-item .value.highlight {
            color: #2563eb;
        }

        .rent-table-wrap {
            border: 1.5px solid #eef2f6;
            border-radius: 16px;
            overflow: hidden;
            background: #ffffff;
        }

        .rent-table-header {
            display: grid;
            grid-template-columns: 72px 1fr 1.2fr;
            background: #f8fafc;
            padding: 10px 20px;
            font-size: 12px;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            border-bottom: 1.5px solid #eef2f6;
        }

        /* ===== 移除滚动限制，全部展示 ===== */
        .rent-table-body {
            /* 移除 max-height 和 overflow-y，自动撑开 */
            /* 保留内边距或其它样式不变 */
        }

        .rent-row {
            display: grid;
            grid-template-columns: 72px 1fr 1.2fr;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 500;
            color: #1e293b;
            border-bottom: 1px solid #f1f4f9;
            align-items: center;
            transition: background 0.12s ease;
        }

        .rent-row:last-child {
            border-bottom: none;
        }

        .rent-row:hover {
            background: #fafcff;
        }

        .rent-row .period {
            font-weight: 600;
            color: #475569;
        }

        .rent-row .amount {
            font-weight: 600;
            color: #0f172a;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .rent-row .amount .currency-sm {
            font-weight: 400;
            color: #94a3b8;
            margin-right: 2px;
        }

        .rent-row .date {
            font-weight: 400;
            color: #64748b;
            font-size: 13px;
            text-align: right;
            font-variant-numeric: tabular-nums;
        }

        .rent-row .period-badge {
            display: inline-block;
            background: #eef2f6;
            color: #475569;
            font-size: 11px;
            font-weight: 600;
            padding: 0 8px;
            border-radius: 20px;
            line-height: 20px;
            min-width: 28px;
            text-align: center;
        }

        .rent-row.first-row .amount {
            color: #2563eb;
        }

        .rent-row.first-row .period-badge {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .empty-hint {
            text-align: center;
            padding: 48px 20px 36px;
            color: #94a3b8;
        }

        .empty-hint .big-icon {
            font-size: 48px;
            display: block;
            margin-bottom: 12px;
        }

        .empty-hint p {
            font-size: 15px;
            font-weight: 400;
        }

        /* ===== 响应式：始终5列，字体缩小 ===== */
        @media (max-width: 700px) {
            .calculator {
                padding: 24px 18px 30px;
                border-radius: 20px;
            }
            .form-grid {
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .field-group.full-width {
                grid-column: 1;
            }
            .mode-switch {
                flex-wrap: wrap;
                gap: 12px;
                padding: 14px 16px;
            }
            .mode-switch .mode-hint {
                margin-left: 0;
                width: 100%;
            }
            .mode-switch .toggle-group {
                flex: 1 1 auto;
            }
            .mode-switch .toggle-btn {
                padding: 6px 16px;
                font-size: 13px;
            }

            .result-summary {
                gap: 8px 10px;
                padding: 12px 12px;
            }
            .result-item .label {
                font-size: 9px;
            }
            .result-item .value {
                font-size: 14px;
            }
            .result-item .value .currency {
                font-size: 11px;
            }

            .rent-table-header,
            .rent-row {
                grid-template-columns: 56px 1fr 1.2fr;
                padding: 8px 14px;
                font-size: 13px;
            }
            .rent-table-header {
                font-size: 11px;
            }
            .actions {
                flex-direction: column-reverse;
            }
            .btn {
                width: 100%;
                justify-content: center;
                text-align: center;
            }
            .header h1 {
                font-size: 21px;
            }
            .header .badge {
                font-size: 11px;
                padding: 2px 10px;
            }
        }

        @media (max-width: 440px) {
            .result-summary {
                gap: 4px 6px;
                padding: 8px 8px;
            }
            .result-item .label {
                font-size: 8px;
            }
            .result-item .value {
                font-size: 12px;
            }
            .result-item .value .currency {
                font-size: 10px;
            }
            .rent-table-header,
            .rent-row {
                grid-template-columns: 44px 1fr 1fr;
                font-size: 12px;
                padding: 6px 10px;
            }
            .rent-row .date {
                font-size: 11px;
            }
            .calculator {
                padding: 16px 12px 22px;
            }
        }
    </style>
</head>
<body>
    <div class="calculator" id="app">
        <div class="header">
            <span class="icon">☀️</span>
            <h1>晴天租 · 计算器</h1>
            <span class="badge">v2.3</span>
        </div>

        <div class="form-grid">
            <!-- 结算价 -->
            <div class="field-group">
                <div class="label-row">
                    <label for="settlementPrice">结算价</label>
                    <span class="required">*</span>
                </div>
                <input type="number" id="settlementPrice" placeholder="请输入金额" step="0.01" min="0" />
                <span class="unit">元 (必填)</span>
            </div>

            <!-- 系数 -->
            <div class="field-group">
                <div class="label-row">
                    <label for="coefficient">系数</label>
                    <span class="required">*</span>
                </div>
                <input type="number" id="coefficient" placeholder="请输入系数" step="0.0001" min="0" />
                <span class="unit">数字 (必填)</span>
            </div>

            <!-- 期数 -->
            <div class="field-group">
                <div class="label-row">
                    <label for="periods">期数</label>
                    <span class="required">*</span>
                    <span class="hint">1 ~ 36</span>
                </div>
                <input type="number" id="periods" placeholder="1 ~ 36" step="1" min="1" max="36" />
                <span class="unit">整数 (必填)</span>
            </div>

            <!-- 首付金额/比例 -->
            <div class="field-group">
                <div class="label-row">
                    <label for="downPayment">首付金额 / 比例</label>
                    <span class="required">*</span>
                    <span class="hint hint--warning">&lt;100 = % &nbsp;|&nbsp; ≥100 = 金额</span>
                </div>
                <input type="number" id="downPayment" placeholder="例: 20 或 5000" step="0.01" min="0" />
                <span class="unit">必填</span>
            </div>

            <!-- 模式切换：改为“首付收取方式”，去掉图标 -->
            <div class="mode-switch">
                <span class="mode-label">首付收取方式</span>
                <div class="toggle-group" role="group">
                    <button type="button" class="toggle-btn active" data-mode="online" id="modeOnline">线上</button>
                    <button type="button" class="toggle-btn" data-mode="offline" id="modeOffline">线下</button>
                </div>
                <span class="mode-hint" id="modeHint">线上：总成本 = 结算价 × 系数</span>
            </div>

            <!-- 首月租金（线下专属） -->
            <div class="field-group first-month-rent" id="firstMonthRentGroup">
                <div class="label-row">
                    <label for="firstMonthRent">首月租金</label>
                    <span class="required">*</span>
                    <span class="hint">线下模式必填</span>
                </div>
                <input type="number" id="firstMonthRent" placeholder="请输入首月租金" step="0.01" min="0" />
                <span class="unit">元 (必填)</span>
            </div>

            <!-- 买断价 -->
            <div class="field-group buyout">
                <div class="label-row">
                    <label for="buyoutPrice">买断价</label>
                    <span class="hint" style="font-weight:400;">非必填</span>
                </div>
                <input type="number" id="buyoutPrice" placeholder="可选，默认为 0" step="0.01" min="0" />
                <span class="unit">元</span>
            </div>
        </div>

        <div class="actions">
            <button type="button" class="btn btn-secondary" id="resetBtn">重置</button>
            <button type="button" class="btn btn-primary" id="calcBtn">📊 计算</button>
        </div>

        <div class="result-area" id="resultArea">
            <!-- 汇总卡片：5列一行 -->
            <div class="result-summary" id="resultSummary">
                <div class="result-item">
                    <span class="label">总成本</span>
                    <span class="value" id="totalCostDisplay">—</span>
                </div>
                <div class="result-item">
                    <span class="label">总租金</span>
                    <span class="value highlight" id="totalRentDisplay">—</span>
                </div>
                <div class="result-item">
                    <span class="label">首月租金</span>
                    <span class="value" id="firstMonthRentDisplay">—</span>
                </div>
                <div class="result-item">
                    <span class="label">月租金 (第2期起)</span>
                    <span class="value" id="monthlyRentDisplay">—</span>
                </div>
                <div class="result-item">
                    <span class="label">到期买断价</span>
                    <span class="value" id="buyoutDisplay">—</span>
                </div>
            </div>

            <div class="rent-table-wrap">
                <div class="rent-table-header">
                    <span>期数</span>
                    <span style="text-align:right;">租金</span>
                    <span style="text-align:right;">还款日期</span>
                </div>
                <div class="rent-table-body" id="rentTableBody">
                    <div class="empty-hint">
                        <span class="big-icon">📋</span>
                        <p>请填写完整信息后点击「计算」</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // DOM refs
            const $ = (id) => document.getElementById(id);
            const settlementPrice = $('settlementPrice');
            const coefficient = $('coefficient');
            const periods = $('periods');
            const downPayment = $('downPayment');
            const firstMonthRent = $('firstMonthRent');
            const buyoutPrice = $('buyoutPrice');

            const modeOnline = $('modeOnline');
            const modeOffline = $('modeOffline');
            const modeHint = $('modeHint');
            const firstMonthRentGroup = $('firstMonthRentGroup');

            const calcBtn = $('calcBtn');
            const resetBtn = $('resetBtn');

            const resultArea = $('resultArea');
            const totalCostDisplay = $('totalCostDisplay');
            const totalRentDisplay = $('totalRentDisplay');
            const firstMonthRentDisplay = $('firstMonthRentDisplay');
            const monthlyRentDisplay = $('monthlyRentDisplay');
            const buyoutDisplay = $('buyoutDisplay');
            const rentTableBody = $('rentTableBody');

            let currentMode = 'online'; // 'online' | 'offline'

            // helpers
            function parseNum(val) {
                const n = parseFloat(val);
                return isNaN(n) ? null : n;
            }

            function parseIntStrict(val) {
                const n = parseInt(val, 10);
                return isNaN(n) ? null : n;
            }

            function fmtCurrency(amount) {
                if (amount === null || amount === undefined || !isFinite(amount)) return '—';
                return '¥' + Math.round(amount).toLocaleString('zh-CN');
            }

            function ceilToInteger(val) {
                if (val === null || !isFinite(val)) return null;
                return Math.ceil(val);
            }

            function getNextMonthDate(baseDate, months) {
                const d = new Date(baseDate);
                const origDay = d.getDate();
                d.setMonth(d.getMonth() + months);
                if (d.getDate() !== origDay) {
                    d.setDate(0);
                }
                return d;
            }

            function formatDate(date) {
                const y = date.getFullYear();
                const m = String(date.getMonth() + 1).padStart(2, '0');
                const d = String(date.getDate()).padStart(2, '0');
                return y + '-' + m + '-' + d;
            }

            // ===== 核心计算 =====
            function calculate() {
                // 读取输入
                const sPrice = parseNum(settlementPrice.value);
                const coef = parseNum(coefficient.value);
                const pds = parseIntStrict(periods.value);
                const dpInput = parseNum(downPayment.value);
                const fmRentInput = parseNum(firstMonthRent.value);
                const buyout = parseNum(buyoutPrice.value) || 0;

                // 必填校验
                if (sPrice === null || sPrice < 0) return { valid: false, reason: '结算价' };
                if (coef === null || coef < 0) return { valid: false, reason: '系数' };
                if (pds === null || pds < 1 || pds > 36) return { valid: false, reason: '期数 (1~36)' };
                if (dpInput === null || dpInput < 0) return { valid: false, reason: '首付金额/比例' };

                // 线下模式首月租金必填
                if (currentMode === 'offline') {
                    if (fmRentInput === null || fmRentInput < 0) {
                        return { valid: false, reason: '首月租金 (线下模式必填)' };
                    }
                }

                // 计算首付金额（实际金额）
                let downPaymentAmount;
                if (dpInput < 100) {
                    downPaymentAmount = (dpInput / 100) * sPrice;
                } else {
                    downPaymentAmount = dpInput;
                }

                // 计算首月租金
                let firstMonthRentVal;
                if (currentMode === 'online') {
                    firstMonthRentVal = downPaymentAmount;
                } else {
                    firstMonthRentVal = fmRentInput;
                }

                // ---- 总成本 ----
                let totalCost;
                if (currentMode === 'online') {
                    totalCost = sPrice * coef;
                } else {
                    // 线下：总成本 = 结算价 * 系数 - 首付金额（实际金额）
                    totalCost = sPrice * coef - downPaymentAmount;
                }

                // 总租金
                const totalRent = totalCost - buyout;

                // 月租金 (第2期起)
                const denominator = pds - 1;
                let monthlyRentVal;
                if (denominator <= 0) {
                    monthlyRentVal = 0;
                } else {
                    let raw;
                    if (currentMode === 'online') {
                        raw = (totalCost - downPaymentAmount - buyout) / denominator;
                    } else {
                        raw = (totalCost - buyout) / denominator;
                    }
                    monthlyRentVal = ceilToInteger(raw);
                    if (monthlyRentVal === null) monthlyRentVal = 0;
                }

                // 生成租金列表
                const rentList = [];
                const today = new Date();
                for (let i = 0; i < pds; i++) {
                    const date = getNextMonthDate(today, i);
                    const amount = (i === 0) ? firstMonthRentVal : monthlyRentVal;
                    rentList.push({
                        period: i + 1,
                        amount: amount,
                        date: date,
                        isFirst: i === 0
                    });
                }

                return {
                    valid: true,
                    totalCost,
                    totalRent,
                    firstMonthRent: firstMonthRentVal,
                    monthlyRent: monthlyRentVal,
                    rentList,
                    downPaymentAmount,
                    buyout,
                    periods: pds,
                    mode: currentMode
                };
            }

            // ===== 渲染结果 =====
            function renderResult(result) {
                if (!result || !result.valid) {
                    resultArea.classList.remove('visible');
                    return;
                }

                resultArea.classList.add('visible');

                totalCostDisplay.textContent = fmtCurrency(result.totalCost);
                totalRentDisplay.textContent = fmtCurrency(result.totalRent);
                firstMonthRentDisplay.textContent = fmtCurrency(result.firstMonthRent);
                monthlyRentDisplay.textContent = fmtCurrency(result.monthlyRent);
                buyoutDisplay.textContent = fmtCurrency(result.buyout);

                if (result.rentList.length === 0) {
                    rentTableBody.innerHTML = `
                        <div class="empty-hint">
                            <span class="big-icon">📭</span>
                            <p>暂无租金数据</p>
                        </div>
                    `;
                    return;
                }

                let html = '';
                for (const item of result.rentList) {
                    const rowClass = item.isFirst ? 'rent-row first-row' : 'rent-row';
                    const amountStr = fmtCurrency(item.amount);
                    const dateStr = formatDate(item.date);
                    html += `
                        <div class="${rowClass}">
                            <span class="period"><span class="period-badge">${item.period}</span></span>
                            <span class="amount">${amountStr}</span>
                            <span class="date">${dateStr}</span>
                        </div>
                    `;
                }
                rentTableBody.innerHTML = html;
            }

            function runCalculation() {
                const result = calculate();
                renderResult(result);
            }

            // ===== 模式切换 =====
            function setMode(mode) {
                currentMode = mode;
                if (mode === 'online') {
                    modeOnline.classList.add('active');
                    modeOffline.classList.remove('active');
                    modeHint.textContent = '线上：总成本 = 结算价 × 系数';
                    firstMonthRentGroup.classList.remove('visible');
                    firstMonthRent.value = '';
                } else {
                    modeOffline.classList.add('active');
                    modeOnline.classList.remove('active');
                    modeHint.textContent = '线下：总成本 = 结算价 × 系数 − 首付金额';
                    firstMonthRentGroup.classList.add('visible');
                }
                runCalculation();
            }

            function resetAll() {
                settlementPrice.value = '';
                coefficient.value = '';
                periods.value = '';
                downPayment.value = '';
                firstMonthRent.value = '';
                buyoutPrice.value = '';
                resultArea.classList.remove('visible');
                setMode('online');
            }

            // ===== 事件绑定 =====
            function init() {
                modeOnline.addEventListener('click', function() {
                    if (currentMode === 'online') return;
                    setMode('online');
                });
                modeOffline.addEventListener('click', function() {
                    if (currentMode === 'offline') return;
                    setMode('offline');
                });

                calcBtn.addEventListener('click', runCalculation);
                resetBtn.addEventListener('click', resetAll);

                let debounceTimer = null;
                const autoCalc = function() {
                    if (debounceTimer) clearTimeout(debounceTimer);
                    debounceTimer = setTimeout(function() {
                        runCalculation();
                        debounceTimer = null;
                    }, 280);
                };

                const inputs = [settlementPrice, coefficient, periods, downPayment, firstMonthRent, buyoutPrice];
                for (const inp of inputs) {
                    inp.addEventListener('input', autoCalc);
                    inp.addEventListener('change', function() {
                        if (debounceTimer) {
                            clearTimeout(debounceTimer);
                            debounceTimer = null;
                        }
                        runCalculation();
                    });
                    inp.addEventListener('keydown', function(e) {
                        if (e.key === 'Enter') {
                            e.preventDefault();
                            runCalculation();
                        }
                    });
                }

                setMode('online');
                runCalculation();
            }

            if (document.readyState === 'complete') {
                init();
            } else {
                window.addEventListener('load', init);
            }
        })();
    </script>
</body>
</html>
